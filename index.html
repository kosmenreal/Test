<!DOCTYPE html>
<html>
<head>
  <title>Risk Calculator</title>

  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 400px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
    }

    button {
      background: blue;
      color: white;
      border: none;
    }

    .section {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<h2>Risk Calculator</h2>

<input id="entry" placeholder="Entry Price (D3)">
<input id="stop" placeholder="Stop Loss (E3)">

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<div class="section">
  <h2>Position Size Calculator</h2>

  <input id="portfolio" placeholder="Portfolio (B3)">
  <input id="risk" placeholder="Risk (C3)">
  <input id="entry2" placeholder="Entry Price (D3)">
  <input id="stop2" placeholder="Stop Loss (E3)">

  <button onclick="calculatePosition()">Calculate</button>

  <p id="result2"></p>
</div>

<script>
// FIRST CALCULATOR
function calculate() {
    let D3 = Number(document.getElementById("entry").value);
    let E3 = Number(document.getElementById("stop").value);

    let diff = Math.abs(D3 - E3);
    let result;

    if (D3 - E3 > 0) {
        result = D3 - (diff * 0.92);
    } else {
        result = D3 + (diff * 0.92);
    }

    document.getElementById("result").innerText = "Result: " + result.toFixed(4);
}

// SECOND CALCULATOR
function calculatePosition() {
    let C3 = Number(document.getElementById("risk").value);
    let D3 = Number(document.getElementById("entry2").value);
    let E3 = Number(document.getElementById("stop2").value);

    let diff = Math.abs(D3 - E3);

    if (diff === 0) {
        document.getElementById("result2").innerText = "Error: Entry and Stop Loss cannot be equal";
        return;
    }

    let result = C3 / diff;

    document.getElementById("result2").innerText =
        "Position Size: " + result.toFixed(4);
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
